---
layout: base
---
{%- include homepage-hero-script.html -%}

<div class="bg-strobo full-banner over">
  <h2 class="d-block d-sm-none strobo-text" aria-label="TOUCH">
    <span class="strobo-char" style="--i:0">T</span><span class="strobo-char" style="--i:1">O</span><span class="strobo-char" style="--i:2">U</span><span class="strobo-char" style="--i:3">C</span><span class="strobo-char" style="--i:4">H</span>
  </h2>
  <h2 class="d-none d-sm-block strobo-text" aria-label="CLICK">
    <span class="strobo-char" style="--i:0">C</span><span class="strobo-char" style="--i:1">L</span><span class="strobo-char" style="--i:2">I</span><span class="strobo-char" style="--i:3">C</span><span class="strobo-char" style="--i:4">K</span>
  </h2>
</div>

<div class="netar-body">

  {%- include nav.html -%}

  {%- if page.title == '' -%}
    <div class="suc-navbar suc-cont__center">
      <h1 class="page-heading">Hello world!</h1>
    </div>
  {%- endif -%}

  <main class="suc-cont home-main-content">
    <section class="suc-content">
      {{ content }}
    </section>
  </main>

  <footer>
    {%- include footer.html -%}
  </footer>

</div>

<script src="{{ "/assets/bundles/homepage-bundle.js" | relative_url }}"></script>
